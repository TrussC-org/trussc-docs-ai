<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrussC docs-chat — demo</title>
<style>
    :root {
        --color-bg: #0a0a0b; --color-bg-card: #16161a; --color-bg-alt: #111113; --color-border: #27272a;
        --color-text: #e8e8ed; --color-text-muted: #8b8b93;
        --color-primary: #6366f1; --color-primary-light: #818cf8; --color-accent: #22d3ee;
        --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-sans); height: 100vh; }
    .page-hint {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px; color: var(--color-text-muted); text-align: center;
    }
    .page-hint h1 { color: var(--color-primary-light); font-size: 22px; font-weight: 600; }
    .page-hint kbd {
        font-family: var(--font-mono); background: var(--color-bg-card); border: 1px solid var(--color-border);
        border-bottom-width: 2px; border-radius: 5px; padding: 2px 8px; color: var(--color-text);
    }
    .page-hint .sub { font-size: 13px; }
    .page-hint .offline { color: #d7a657; }
</style>
</head>
<body>
    <div class="page-hint">
        <h1>TrussC docs-chat</h1>
        <div>Press <kbd>F1</kbd> to summon the assistant (hidden easter-egg trigger)</div>
        <div id="status" class="sub">checking server…</div>
    </div>

    <!-- The widget is the production artifact: it injects its own UI and is
         health-gated. Same-origin here (the dev server serves both). -->
    <script defer src="/chat-widget.js"></script>

    <script>
    // Demo-only: surface server status in the backdrop (the widget gates itself).
    fetch('/health').then(r => r.json()).then(j => {
        document.getElementById('status').innerHTML = j.ok
            ? `server online · ${j.chunks} chunks indexed · press F1`
            : '<span class="offline">server offline</span>';
    }).catch(() => { document.getElementById('status').innerHTML = '<span class="offline">server offline</span>'; });
    </script>
</body>
</html>
