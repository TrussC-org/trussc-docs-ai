<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrussC docs-chat — demo</title>
<style>
    :root {
        --bg: #0a0a0b; --panel: #16161a; --alt: #111113; --border: #27272a;
        --text: #e8e8ed; --muted: #8b8b93; --primary: #6366f1; --primary-light: #818cf8; --accent: #22d3ee;
        --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
        --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; }

    /* Demo backdrop note */
    .page-hint {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px; color: var(--muted); text-align: center;
    }
    .page-hint h1 { color: var(--primary-light); font-size: 22px; font-weight: 600; }
    .page-hint kbd {
        font-family: var(--mono); background: var(--panel); border: 1px solid var(--border);
        border-bottom-width: 2px; border-radius: 5px; padding: 2px 8px; color: var(--text);
    }
    .page-hint .offline { color: #d7a657; }

    /* Floating bubble */
    .cw-bubble {
        position: fixed; right: 22px; bottom: 22px; width: 52px; height: 52px; border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        display: none; align-items: center; justify-content: center; cursor: pointer;
        box-shadow: 0 6px 20px rgba(0,0,0,0.5); z-index: 9998; border: none;
        transition: transform 0.15s;
    }
    .cw-bubble:hover { transform: translateY(-2px); }
    .cw-bubble svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 2; }
    .cw-bubble.show { display: flex; }

    /* Panel */
    .cw-panel {
        position: fixed; right: 22px; bottom: 22px; width: 546px; max-width: calc(100vw - 24px);
        height: 560px; max-height: calc(100vh - 44px);
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        display: none; flex-direction: column; overflow: hidden; z-index: 9999;
        box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .cw-panel.open { display: flex; }
    .cw-head {
        display: flex; align-items: center; gap: 8px; padding: 12px 14px;
        border-bottom: 1px solid var(--border); background: var(--alt);
    }
    .cw-head .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .cw-head .title { font-size: 14px; font-weight: 600; }
    .cw-head .sub { font-size: 11px; color: var(--muted); }
    .cw-head .x { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
    .cw-head .x:hover { color: var(--text); }

    .cw-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .cw-msgs::-webkit-scrollbar { width: 7px; }
    .cw-msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { font-size: 13.5px; line-height: 1.6; max-width: 92%; }
    .msg.user { align-self: flex-end; background: var(--primary); color: #fff; padding: 8px 12px; border-radius: 12px 12px 2px 12px; }
    .msg.bot { align-self: flex-start; color: var(--text); }
    .msg.bot pre { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; margin: 6px 0; overflow-x: auto; font-family: var(--mono); font-size: 12px; }
    .msg.bot code { font-family: var(--mono); font-size: 12px; }
    .msg.bot a { color: var(--accent); text-decoration: none; }
    .msg.bot a:hover { text-decoration: underline; }
    .msg .reflinks { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .msg .reflinks a { color: var(--accent); text-decoration: none; }
    .msg .reflinks a:hover { text-decoration: underline; }
    .msg .sources { margin-top: 8px; font-size: 11px; color: var(--muted); }
    .msg .sources summary { cursor: pointer; user-select: none; }
    .msg .sources .src { padding: 2px 0; }
    .msg .sources .tag { color: var(--accent); }

    .cw-input { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); }
    .cw-input textarea {
        flex: 1; resize: none; height: 38px; max-height: 110px; background: var(--bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; font-family: var(--sans);
        font-size: 13px; outline: none;
    }
    .cw-input textarea:focus { border-color: var(--primary); }
    .cw-input button {
        background: var(--primary); color: #fff; border: none; border-radius: 9px; padding: 0 14px;
        cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .cw-input button:disabled { opacity: 0.5; cursor: default; }
    .blink::after { content: '▍'; color: var(--muted); animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
    <div class="page-hint">
        <h1>TrussC docs-chat</h1>
        <div>Press <kbd>F1</kbd> to summon the assistant (hidden easter-egg trigger)</div>
        <div id="status" class="sub">checking server…</div>
    </div>

    <button class="cw-bubble" id="bubble" aria-label="Open TrussC assistant">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </button>

    <div class="cw-panel" id="panel">
        <div class="cw-head">
            <span class="dot"></span>
            <div>
                <div class="title">TrussC Assistant</div>
                <div class="sub">beginner docs helper · local LLM</div>
            </div>
            <button class="x" id="close">×</button>
        </div>
        <div class="cw-msgs" id="msgs"></div>
        <div class="cw-input">
            <textarea id="q" placeholder="Ask about TrussC… (e.g. how do I draw a curve?)" rows="1"></textarea>
            <button id="send">Send</button>
        </div>
    </div>

<script>
const API = location.origin;        // server.mjs serves this page, so same-origin
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const bubble = $('bubble'), panel = $('panel'), msgs = $('msgs');
let online = false, busy = false;
const convo = [];   // conversation history sent back each turn for follow-up chains

// Health gate: only let the assistant appear if the server answers.
fetch(API + '/health').then(r => r.json()).then(j => {
    online = !!j.ok;
    $('status').innerHTML = online
        ? `server online · ${j.chunks} chunks indexed`
        : '<span class="offline">server offline</span>';
}).catch(() => { $('status').innerHTML = '<span class="offline">server offline</span>'; });

function openPanel() {
    if (!online) return;
    bubble.classList.remove('show');
    panel.classList.add('open');
    $('q').focus();
    if (!msgs.children.length) addBot('こんにちは！TrussC のことなら何でも聞いてね。例：「曲線ってどう描くの？」「drawRect を使う例ある？」').el.querySelector('.blink')?.classList.remove('blink');
}
function closePanel() { panel.classList.remove('open'); if (online) bubble.classList.add('show'); }

// F1 reveals the bubble (easter egg) and opens the panel.
window.addEventListener('keydown', (e) => {
    if (e.key === 'F1') { e.preventDefault(); if (online) { bubble.classList.add('show'); openPanel(); } }
});
bubble.addEventListener('click', openPanel);
$('close').addEventListener('click', closePanel);

// --- rendering: escape, then ```code``` → <pre>, newlines → <br> -------------
function render(text) {
    const parts = text.split(/```/);
    return parts.map((p, i) => i % 2
        ? `<pre>${esc(p.replace(/^[a-zA-Z]*\n/, ''))}</pre>`
        : esc(p)
            .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+|\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\n/g, '<br>')
    ).join('');
}
function addUser(text) {
    const el = document.createElement('div'); el.className = 'msg user'; el.textContent = text;
    msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight;
}
function addBot(text = '') {
    const el = document.createElement('div'); el.className = 'msg bot';
    el.innerHTML = render(text) + '<span class="blink"></span>';
    msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight;
    return { el, buf: text };
}

async function send() {
    const q = $('q').value.trim();
    if (!q || busy || !online) return;
    busy = true; $('send').disabled = true;
    $('q').value = ''; $('q').style.height = '38px';   // clear input + collapse back to one row
    addUser(q);
    const bot = addBot('');
    let sources = null, links = null;
    try {
        const r = await fetch(API + '/chat', {
            method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ question: q, history: convo }),   // send prior turns for context
        });
        const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = '';
        for (;;) {
            const { value, done } = await reader.read(); if (done) break;
            buf += dec.decode(value, { stream: true });
            let sep;
            while ((sep = buf.indexOf('\n\n')) !== -1) {
                const block = buf.slice(0, sep); buf = buf.slice(sep + 2);
                const ev = /event: (.+)/.exec(block)?.[1];
                const data = /data: ([\s\S]+)/.exec(block)?.[1];
                if (!ev || data === undefined) continue;
                const payload = JSON.parse(data);
                if (ev === 'token') { bot.buf += payload; bot.el.innerHTML = render(bot.buf) + '<span class="blink"></span>'; msgs.scrollTop = msgs.scrollHeight; }
                else if (ev === 'sources') { sources = payload; }
                else if (ev === 'links') { links = payload; }
                else if (ev === 'error') { bot.buf += '\n\n[error: ' + payload + ']'; }
            }
        }
    } catch (e) {
        bot.buf += '\n\n[connection error]';
    }
    // finalize: drop the cursor; append "詳しくは" links + the sources disclosure
    let html = render(bot.buf);
    if (links && links.length) {
        html += `<div class="reflinks">詳しくは: ` +
            links.map(l => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`).join(' · ') +
            `</div>`;
    }
    if (sources && sources.length) {
        html += `<details class="sources"><summary>sources (${sources.length})</summary>` +
            sources.map(s => {
                const t = s.link ? `<a href="${esc(s.link)}" target="_blank" rel="noopener">${esc(s.title)}</a>` : esc(s.title);
                return `<div class="src"><span class="tag">[${esc(s.source)}]</span> ${t} · ${s.score.toFixed(2)}</div>`;
            }).join('') +
            `</details>`;
    }
    bot.el.innerHTML = html;
    // record the turn (raw answer text, without the appended links/sources HTML)
    convo.push({ role: 'user', content: q }, { role: 'assistant', content: bot.buf });
    busy = false; $('send').disabled = false; $('q').focus();
}

$('send').addEventListener('click', send);
// Ignore Enter while the IME is composing (Japanese/Korean confirm key), else the
// confirm-Enter sends a half-baked query and the committed text reappears after clear.
$('q').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); send(); } });
$('q').addEventListener('input', (e) => { e.target.style.height = '38px'; e.target.style.height = Math.min(110, e.target.scrollHeight) + 'px'; });
</script>
</body>
</html>
