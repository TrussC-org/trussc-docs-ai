# cloudflared tunnel config → ~/.cloudflared/config.yml on the Ubuntu box.
# Replace <TUNNEL_ID> and the credentials path with the values printed by
# `cloudflared tunnel create trussc-docs-chat`.
tunnel: <TUNNEL_ID>
credentials-file: /home/trussc/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: api.trussc.org
    service: http://localhost:8788
  # everything else → 404 (don't expose anything but the API)
  - service: http_status:404
